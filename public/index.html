    <div id="search-bar">
      <input id="search-input" type="text" placeholder="Search sessions..." />
      <button id="search-clear" type="button" aria-label="Clear search">&times;</button>
      <button id="search-titles-toggle" type="button" title="Search titles only" aria-label="Search titles only">Tt</button>

    <div id="plans-content" style="display:none;"></div>
    <div id="stats-content" style="display:none;">
      <div class="plans-empty">Click the Stats tab to view activity heatmap.</div>
    </div>
    <div id="memory-content" style="display:none;"></div>

  <div id="sidebar-resize-handle"></div>
  <div id="main">
    <div id="placeholder">
      <p>Select a session from the sidebar to begin.</p>
    </div>
    <div id="stats-viewer" style="display:none;">
      <div id="stats-viewer-header">
        <span id="stats-viewer-title">Activity</span>
      </div>
      <div id="stats-viewer-body"></div>
    </div>
    <div id="memory-viewer" style="display:none;"></div>
    <div id="plan-viewer" style="display:none;"></div>
    <div id="settings-viewer" style="display:none;">
      <div id="settings-viewer-header">
        <span id="settings-viewer-title">Settings</span>
      </div>
      <div id="settings-viewer-body"></div>
    </div>
    <div id="jsonl-viewer" style="display:none;">
      <div id="jsonl-viewer-header">
        <span id="jsonl-viewer-title">Message History</span>
        <span id="jsonl-viewer-session-id"></span>
      </div>
      <div id="jsonl-viewer-body"></div>
    </div>
    <div id="terminal-area">
      <div id="terminal-header" style="display:none;">
        <div id="terminal-header-info">
          <span id="terminal-header-name"></span>
          <span id="terminal-header-pty-title" style="display:none;"></span>
          <span id="terminal-header-id"></span>
          <span id="terminal-header-shell" style="display:none;"></span>
        </div>
        <div id="terminal-header-controls">
          <span id="terminal-header-status"></span>
          <button id="terminal-stop-btn" title="Stop process"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="2" y="2" width="8" height="8" rx="1"/></svg></button>
        </div>
      </div>
      <div id="grid-viewer" style="display:none;">
        <div id="grid-viewer-header">
          <span id="grid-viewer-title">Session Overview</span>
          <span id="grid-viewer-count"></span>
        </div>
      </div>
      <div id="terminals"></div>
    </div>
  </div>
  </div><!-- /app-container -->
  <div id="update-toast" class="hidden">
    <span id="update-toast-msg">Update ready — restart to apply</span>
    <button id="update-restart-btn">Restart</button>
    <button id="update-dismiss-btn">Later</button>
  </div>
  <div id="status-bar"><span id="status-bar-info"></span><span id="status-bar-activity"></span><span id="status-bar-updater"></span></div>
